name: presentation_evaluator
description: 금융기관용 태블릿 기반 제품 설명회 평가·집계 시스템
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: 6.1.5+1

  # Local storage
  hive: 2.2.3
  hive_flutter: 1.1.0
  shared_preferences: 2.5.3

  # UI components
  cupertino_icons: ^1.0.6
  fl_chart: ^0.68.0
  qr_flutter: ^4.1.0
  data_table_2: ^2.5.12
  intl: ^0.20.2
  uuid: ^4.4.0

  # Export
  csv: ^6.0.0
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/
